name: Build Dysmantle Port

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Binary and Fixpak
        run: |
          docker run --rm -v "$PWD":/repo debian:bullseye bash -c "
            apt-get update && apt-get install -y build-essential libsdl2-dev
            cd /repo/ports/dysmantle
            bash build_compat_gcc.sh
            gcc -O2 -o fixpak src/fixpak.c src/etc2_decode.c src/jpeg_enc.c -ldl
          "
      - name: Prepare Package
        run: |
          mkdir -p dist/dysmantle
          cp ports/dysmantle/dysmantle.compat.gcc dist/dysmantle/dysmantle
          cp ports/dysmantle/fixpak dist/dysmantle/
          cp ports/dysmantle/*.gptk dist/dysmantle/
          # Kopiere das Launcher-Skript (siehe unten)
          cp launcher.sh dist/dysmantle/
          tar -cvzf dysmantle-r36s.tar.gz -C dist dysmantle
      - uses: actions/upload-artifact@v4
        with:
          name: dysmantle-r36s-package
          path: dysmantle-r36s.tar.gz
