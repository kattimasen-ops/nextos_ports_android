# OpenAL-soft -- config de audio UNIVERSAL do SOR4 (mesma do Bully/Dysmantle).
# 'drivers = pipewire,pulse,alsa' = ordem de preferencia de backend (auto, sem forcar):
#  - pipewire NATIVO (X5M/KMS): stream gerenciado, nao prende o PCM no modeset do HDMI.
#  - pulse (Mali-450/Amlogic-old, sem pipewire): evita broken-pipe do ALSA cru.
#  - alsa (fallback): mmap=false anti broken-pipe.
[general]
drivers = pipewire,pulse,alsa

[alsa]
mmap = false
