# OpenAL-soft config p/ devices SO-ALSA (R36S/ArkOS e afins SEM PulseAudio).
# Nesses Rockchip o backend ALSA *mmap* do OpenAL faz underrun
# ("ALCplaybackAlsa_mixerProc: mmap commit error: Broken pipe") e trava o audio
# em sessoes longas. Forcar o caminho NON-MMAP + buffers maiores resolve.
# O launcher (Bully.sh) so aponta ALSOFT_CONF pra ca quando NAO ha PulseAudio e
# NAO e o X5M (cujo audio ja funciona) -> nao afeta quem ja estava ok.
[general]
drivers = alsa
periods = 4
period_size = 1024

[alsa]
mmap = false
