# OpenAL-soft -- config de audio UNIVERSAL do Bully (qualquer device).
# 'drivers = pipewire,pulse,alsa' = ordem de preferencia de backend:
#  - PipeWire NATIVO (ex: X5M): stream gerenciado pelo PipeWire -> NAO abre o PCM
#    ALSA cru, entao NAO fica preso no XRUN quando o jogo vira DRM master e faz o
#    modeset do HDMI (era a causa do "mudo pela ES" no X5M). Exige openal-soft
#    compilado com o backend pipewire (ALSOFT_BACKEND_PULSEAUDIO=on traz pulse+pw).
#  - pulse (ex: Mali-450/Amlogic-old, que nao tem pipewire): evita o broken-pipe.
#  - alsa (ex: R36S/ArkOS ALSA-puro): ultimo recurso; mmap=false anti broken-pipe.
[general]
drivers = pipewire,pulse,alsa

[alsa]
mmap = false
